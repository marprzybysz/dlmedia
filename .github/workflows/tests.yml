name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # The suite only needs bash + python3 (+ coreutils/awk, already present):
      # it sources dlmedia with DLMEDIA_LIB=1 (functions only, no dialog/stdbuf)
      # and stubs yt-dlp/spotdl. No TUI is exercised.
      - name: Run test suite
        run: bash tests/run.sh

      - name: Lint shell script
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck -S warning dlmedia || true
