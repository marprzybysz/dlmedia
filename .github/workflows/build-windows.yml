name: build-windows

# Build the Windows .exe + installer in the cloud (no local Windows needed).
#   • Release published → build + attach the installer to that release.
#   • Push to `testing`  → build + upload the installer as a downloadable artifact
#                          (validate the real installer before cutting a release).
#   • workflow_dispatch  → same, on demand.
# main is NOT built here — it only runs `tests.yml`. The build always runs behind the
# `test` gate below, so a broken commit never produces (or ships) an installer.
on:
  release:
    types: [published]
  push:
    branches: [testing]
  workflow_dispatch:

permissions:
  contents: write          # needed to upload the installer onto the release

jobs:
  # Gate: the same suite as tests.yml, but here it BLOCKS the build (needs: test).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Full test suite (bash + python)
        run: bash tests/run.sh

  build:
    needs: test            # only build if the tests are green on this commit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip pyinstaller PySide6

      - name: Fetch yt-dlp + ffmpeg (bundled into the app)
        run: .\gui\fetch-tools.ps1

      - name: Build app (PyInstaller)
        run: python -m PyInstaller --noconfirm gui\dlmedia.spec

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Derive version from the release tag (v1.2.3 -> 1.2.3)
        id: ver
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if (-not $tag) { $tag = "0.0.0-dev" }
          $ver = $tag -replace '^v', ''
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build installer (Inno Setup)
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} gui\installer.iss'

      - name: Upload installer as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DLMedia-Windows-Installer
          path: gui\Output\*.exe

      - name: Attach installer to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = (Get-Item gui\Output\*.exe).FullName
          gh release upload "${{ github.event.release.tag_name }}" "$exe" --clobber
